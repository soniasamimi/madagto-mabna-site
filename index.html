<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=/en/">
<title>Madagto Mabna | ماداکتومبنا</title>
<script>
  var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (lang.indexOf('fa') === 0) {
    window.location.replace('/fa/');
  } else {
    window.location.replace('/en/');
  }
</script>
</head>
<body>
  <p>Redirecting… / <span dir="rtl">در حال انتقال…</span></p>
  <p><a href="/en/">English</a> | <a href="/fa/">فارسی</a></p>
</body>
</html>
